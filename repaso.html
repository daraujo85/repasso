<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulado Interactivo – Repaso I (JSON)</title>
  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="" id="og-url">

  <meta property="og:image" content="" id="og-image">
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="" id="twitter-url">
  <meta property="twitter:title" content="Simulado Interactivo de Espanhol" id="twitter-title">
  <meta property="twitter:description" content="Pratique espanhol com simulados interativos. Exercícios de gramática, vocabulário e compreensão auditiva com feedback imediato." id="twitter-description">
  <meta property="twitter:image" content="" id="twitter-image">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background:#f8fafc; color:#222; margin:0; padding:0; font-size:18px; line-height:1.6; }
    header { 
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
      color:#fff; 
      padding:30px 20px; 
      text-align:center; 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    header h1 { 
      margin:0 0 8px 0; 
      font-size:32px; 
      font-weight:700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }
    header h1 i { font-size:28px; }
    header p { 
      margin:0; 
      font-size:16px; 
      opacity:0.95;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    header p i { font-size:14px; }
    main { max-width:1000px; margin:20px auto; padding:10px; }
    .card { background:#fff; border:1px solid #ddd; border-radius:10px; padding:50px; margin:25px 0; box-shadow:0 2px 5px rgba(0,0,0,0.05); transition:all 0.3s ease; position:relative; overflow:hidden; }
    .card.group-completed { 
      border:3px solid #10b981; 
      background:linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
      box-shadow:0 4px 20px rgba(16,185,129,0.3);
      animation:groupSuccess 0.6s ease;
    }
    .card.group-completed::before {
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg, #10b981, #34d399, #10b981);
      animation:shimmer 2s infinite;
    }
    @keyframes groupSuccess {
      0% { transform:scale(1); }
      50% { transform:scale(1.02); }
      100% { transform:scale(1); }
    }
    @keyframes shimmer {
      0% { transform:translateX(-100%); }
      100% { transform:translateX(100%); }
    }
    .group-success-message {
      display:none;
      background:linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color:#fff;
      padding:15px 20px;
      border-radius:8px;
      margin:15px 0;
      text-align:center;
      font-weight:bold;
      font-size:18px;
      box-shadow:0 4px 12px rgba(16,185,129,0.3);
      animation:slideDown 0.5s ease;
    }
    .group-success-message.show {
      display:block;
    }
    @keyframes slideDown {
      from {
        opacity:0;
        transform:translateY(-10px);
      }
      to {
        opacity:1;
        transform:translateY(0);
      }
    }
    .card.group-completed h2 {
      color:#059669;
      position:relative;
    }
    .card.group-completed h2::after {
      content:'\f058';
      font-family:'Font Awesome 6 Free';
      font-weight:900;
      margin-left:10px;
      color:#10b981;
      animation:bounce 0.6s ease;
    }
    @keyframes bounce {
      0%, 100% { transform:translateY(0); }
      50% { transform:translateY(-5px); }
    }
    h2 { font-size:22px; margin:0 0 15px; color:#333; }
    label { display:block; margin:12px 0 6px; font-weight:bold; }
    .row { display:flex; gap:12px; align-items:flex-start; margin-top:10px; }
    .num { width:32px; font-weight:bold; }
    input.inp { width:100%; padding:12px; font-size:18px; border:1px solid #bbb; border-radius:6px; }
    .feedback { margin-top:6px; }
    .ok { color:#065f46; background:#d1fae5; padding:8px; border-radius:6px; }
    .bad { color:#991b1b; background:#fee2e2; padding:8px; border-radius:6px; }
    .row.error-shake {
      animation:shakeError 0.5s ease;
    }
    @keyframes shakeError {
      0%, 100% { transform:translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform:translateX(-5px); }
      20%, 40%, 60%, 80% { transform:translateX(5px); }
    }
    .row.error-highlight {
      border-left:4px solid #dc2626;
      padding-left:8px;
      background-color:#fef2f2;
      border-radius:4px;
      transition:all 0.3s ease;
    }
    body.dark-mode .row.error-highlight {
      background-color:#7f1d1d;
      border-left-color:#ef4444;
    }
    .report-q-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      transition: color 0.2s;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .report-q-btn:hover { color: #ef4444; }
    .top-player-badge {
      font-size: 15px;
      color: #9a3412;
      background: #ffedd5;
      padding: 6px 16px;
      border-radius: 50px;
      border: 2px solid #fb923c;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 4px rgba(251, 146, 60, 0.2);
    }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; justify-content:space-between; width: 100%; }
    button { font-size:18px; padding:12px 20px; border:none; border-radius:6px; cursor:pointer; }
    #btnCheck { background:#4f46e5; color:#fff; }
    #btnClear { background:#e5e7eb; }
    #scoreBox { text-align:right; font-weight:bold; margin-bottom:15px; font-size:20px; }
    .progress-bar { 
      background:#e5e7eb; 
      border-radius:6px; 
      overflow:visible; 
      height:35px; 
      margin:8px; 
      position:relative;
      border:2px solid #cbd5e1;
    }
    .progress-fill { 
      background:linear-gradient(to right,#4f46e5,#3b82f6); 
      height:100%; 
      width:0%; 
      transition:width .3s ease;
      border-radius:4px;
      position:relative;
    }
    .progress-runner {
      position:absolute;
      top:50%;
      left:0;
      transform:translate(-50%, -50%);
      font-size:24px;
      z-index:10;
      transition:left .3s ease;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,0.5);
    }
    .progress-finish {
      position:absolute;
      top:50%;
      right:2px;
      transform:translate(0, -50%);
      font-size:18px;
      z-index:10;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      color:#10b981;
      line-height:1;
    }
    @keyframes running {
      0%, 100% { transform:translate(-50%, -50%) rotate(0deg); }
      25% { transform:translate(-50%, -50%) rotate(-8deg); }
      75% { transform:translate(-50%, -50%) rotate(8deg); }
    }
    .progress-runner.running {
      animation:running 0.6s ease-in-out infinite;
    }
    .badge { display:inline-block; background:#fff7ed; color:#c2410c; border:1px solid #fdba74; padding:2px 8px; border-radius:999px; font-size:12px; margin-left:10px; }
    .prompt-media { margin:0 0 12px; width: 100%; }
    .prompt-media img { width:100%; height:auto; display:block; border-radius:6px; }
    .prompt-audio { margin:0 0 12px; width:100%; }
    .prompt-audio audio { 
      width:100%; 
      max-width:100%; 
      height:50px;
      border-radius:12px;
      background:linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      outline:none;
    }
    /* Dark mode adjustments */
    body.dark-mode { background:#111827; color:#e5e7eb; }
    body.dark-mode .card { background:#1f2937; border-color:#374151; color:#e5e7eb; }
    body.dark-mode input.inp, body.dark-mode select.sel, body.dark-mode select { background:#374151; border-color:#4b5563; color:#e5e7eb; }
    body.dark-mode .ok { background:#064e3b; color:#6ee7b7; }
    body.dark-mode .bad { background:#7f1d1d; color:#fca5a5; }
    
    /* Footer */
    footer { background:#1e293b; color:#e2e8f0; padding:30px 20px; margin-top:40px; text-align:center; font-size:14px; }
    footer a { color:#60a5fa; text-decoration:none; }
    footer a:hover { text-decoration:underline; }

    /* seletor de simulados, discreto e à direita */
    .sim-selector { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin: 6px 10px 0; }
    .sim-select { font-size:14px; padding:6px 8px; border:1px solid #ddd; border-radius:6px; background:#fff; }
    
    .wa-btn { background:#25D366; color:#fff; }
    .report-btn { background:#dc2626; color:#fff; }
    .test-btn { background:#f59e0b; color:#fff; border-radius: 6px; padding: 12px 20px; cursor: pointer; border: none; font-size: 18px; }

    /* Botão Dark Mode */
    #btnDarkMode { position:fixed; top:20px; right:20px; z-index:1001; background:#374151; color:#fff; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); transition:all 0.3s ease; display:flex; align-items:center; justify-content:center; }

    /* Modal de sucesso completo */
    .success-modal, .ranking-modal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      z-index:10000;
      justify-content:center;
      align-items:center;
      overflow-y: auto;
    }
    .success-modal.show, .ranking-modal.show {
      display:flex;
    }
    .success-modal-content, .ranking-modal-content {
      background:#fff;
      border-radius:20px;
      padding:30px;
      max-width:600px;
      width: 90%;
      text-align:center;
      position: relative;
    }
    .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
    .ranking-table th, .ranking-table td { padding: 10px; border-bottom: 1px solid #eee; }
    .ranking-table th { background: #f8fafc; font-weight: bold; }
    .ranking-table tr:nth-child(even) { background: #f9f9f9; }
    .ranking-form { text-align: left; margin-top: 20px; background: #f1f5f9; padding: 20px; border-radius: 12px; }
    .ranking-form input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1><i class="fas fa-graduation-cap"></i> Simulado Interactivo – Repaso I</h1>
    <p><i class="fas fa-check-double"></i> Responda e veja o feedback imediato.</p>
  </header>

  <button id="btnDarkMode" onclick="toggleDarkMode()" title="Alternar modo escuro/claro" aria-label="Alternar modo escuro">
    <i class="fas fa-moon"></i>
  </button>

  <main>
    <div class="sticky-top" style="position: sticky; top: 0; background: #f8fafc; z-index: 100; padding: 10px 0;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin: 10px;">
        <div id="timerBox" style="font-weight:bold; font-size:18px; color:#6366f1;"><i class="fas fa-clock"></i> <span id="timer">00:00</span></div>
        <div id="scoreBox" style="font-weight:bold; font-size:20px;"><i class="fas fa-star"></i> Nota: 0%</div>
      </div>
      <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
        <div id="progressRunner" class="progress-runner" style="position: absolute; transition: left 0.3s ease;"><i class="fas fa-running"></i></div>
        <div class="progress-finish" style="position: absolute; right: 10px;"><i class="fas fa-flag-checkered"></i></div>
      </div>
      <div class="sim-selector" style="justify-content: space-between;">
        <button onclick="showRanking()" class="test-btn" style="padding: 6px 12px; font-size: 14px; background: #10b981;"><i class="fas fa-list-ol"></i> Ver Ranking</button>
        <div>
          <span style="font-weight:normal; font-size:14px; color:#555;"><i class="fas fa-list"></i> Simulado:</span>
          <select id="simSelect" class="sim-select">
            <option value="">Carregando simulados...</option>
          </select>
        </div>
      </div>
    </div>
    
    <div id="quiz"></div>
    
    <!-- Modal de sucesso completo -->
    <div id="successModal" class="success-modal">
      <div class="success-modal-content">
        <img id="successGif" src="" alt="¡Felicitaciones!">
        <h3><i class="fas fa-trophy"></i> ¡Perfecto!</h3>
        <p>Has completado todas las perguntas correctamente.</p>
        <p style="margin-top:15px; font-size:20px; font-weight:bold; color:#6366f1;"><i class="fas fa-clock"></i> Tiempo: <span id="finalTime">00:00</span></p>
        
        <div id="rankingRegistration" class="ranking-form">
          <h4 style="margin-top:0;"><i class="fas fa-user-edit"></i> ¡Entra en el Ranking!</h4>
          <label for="rankName">Nombre:</label>
          <input type="text" id="rankName" placeholder="Tu nombre">
          <label for="rankPhone">Celular:</label>
          <input type="tel" id="rankPhone" placeholder="Tu celular (para buscar/salvar)">
          <button id="btnSaveRanking" class="test-btn" style="width:100%; margin-top:10px; background:#4f46e5;" onclick="saveRankingData()"><i class="fas fa-save"></i> Guardar mi puntuación</button>
        </div>
        <button class="test-btn" style="margin-top:20px; background:#64748b; font-size: 14px; padding: 8px 16px;" onclick="closeSuccessModal()">Continuar sin guardar</button>
      </div>
    </div>

    <!-- Modal do Ranking -->
    <div id="rankingModal" class="ranking-modal" onclick="if(event.target==this) closeRankingModal()">
      <div class="ranking-modal-content">
        <button onclick="closeRankingModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:#64748b;"><i class="fas fa-times"></i></button>
        <h2 style="color: #1e293b;"><i class="fas fa-trophy" style="color:#f59e0b;"></i> Ranking Global</h2>
        <div id="rankingContent" style="max-height: 400px; overflow-y: auto;">
          <p><i class="fas fa-spinner fa-spin"></i> Cargando ranking...</p>
        </div>
        <button class="test-btn" style="margin-top:20px; background:#4f46e5;" onclick="closeRankingModal()">Volver al simulado</button>
      </div>
    </div>

    <div class="actions">      
      <button id="btnClear" onclick="clearErrors(); location.reload()"><i class="fas fa-redo"></i> Novo Simulado</button>
      <button id="btnShare" class="wa-btn" onclick="shareWhatsApp()"><i class="fab fa-whatsapp"></i> Compartilhar no WhatsApp</button>
      <button id="btnReport" class="report-btn" onclick="reportError()"><i class="fas fa-bug"></i> Reportar Erro</button>
      <button id="btnPrint" onclick="window.print()"><i class="fas fa-print"></i> Imprimir</button>
    </div>
  </main>

  <footer>
    <div class="credits">
      <p><strong>Desenvolvido por Diego Araujo</strong></p>
    </div>
  </footer>

  <script>
    let totalQuestions = 0;
    let startTime = null;
    let timerInterval = null;
    let elapsedTime = 0; // em segundos
    let mistakeHistory = []; // Volátil: armazena TODOS os erros cometidos, mesmo que corrigidos
    let audioPlayed = false;

    function clearErrors() {
      mistakeHistory = [];
      const container = document.getElementById('aiFeedbackContainer');
      if (container) container.style.display = 'none';
      audioPlayed = false;
    }

    // UI: Container para o feedback da IA
    function renderAIFeedbackUI() {
      let container = document.getElementById('aiFeedbackContainer');
      const isDebug = getDebugParam();
      const rows = Array.from(document.querySelectorAll('.row'));
      const allChecked = rows.length > 0 && rows.every(r => r.dataset.checked === 'true');
      
      if (!isDebug && !allChecked) return;

      if (!container) {
        container = document.createElement('div');
        container.id = 'aiFeedbackContainer';
        container.className = 'card';
        container.style.cssText = 'border: 3px solid #f59e0b; background: linear-gradient(135deg, #fffbeb 0%, #fff 100%); display: none; margin-top: 30px; padding-top: 60px; position: relative;';
        
        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.style.cssText = 'position: absolute; top: 15px; right: 20px; background: #f59e0b; color: #fff; padding: 8px 20px; font-size: 16px; border-radius: 50px; font-weight: bold; border: none; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); z-index: 10;';
        badge.innerHTML = '<i class="fas fa-robot"></i> Tutor de IA';
        container.appendChild(badge);

        const content = document.createElement('div');
        content.id = 'aiFeedbackContent';
        container.appendChild(content);

        const btnRow = document.createElement('div');
        btnRow.id = 'aiFeedbackBtnRow';
        btnRow.style.cssText = 'margin-top: 20px; text-align: center;';
        
        const btn = document.createElement('button');
        btn.id = 'btnGetAIFeedback';
        btn.className = 'test-btn';
        btn.style.cssText = 'padding: 15px 30px; font-size: 20px; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);';
        btn.innerHTML = '<i class="fas fa-magic"></i> ¡Necesito ajuda com meus erros!';
        btn.onclick = getAIFeedback;
        btnRow.appendChild(btn);
        
        container.appendChild(btnRow);
        
        const quiz = document.getElementById('quiz');
        quiz.parentNode.insertBefore(container, quiz.nextSibling);
      }

      if (mistakeHistory.length > 0) {
        container.style.display = 'block';
        document.getElementById('aiFeedbackContent').innerHTML = `
          <h2 style="color: #d97706; margin-bottom: 10px;"><i class="fas fa-chalkboard-teacher"></i> Feedback Personalizado</h2>
          <p style="font-size: 18px;">Durante tu práctica has cometido <strong>${mistakeHistory.length}</strong> errores. ¿Quieres que tu profesor de español te explique estos temas para que no vuelvas a fallar?</p>
        `;
        document.getElementById('aiFeedbackBtnRow').style.display = 'block';
      } else if (isDebug) {
         container.style.display = 'block';
         document.getElementById('aiFeedbackContent').innerHTML = `
          <h2 style="color: #d97706; margin-bottom: 10px;"><i class="fas fa-chalkboard-teacher"></i> Debug Mode</h2>
          <p style="font-size: 18px;">No hay errores registrados, pero puedes probar o feedback con datos de exemplo.</p>
        `;
        document.getElementById('aiFeedbackBtnRow').style.display = 'block';
      }
    }

    function formatAIResponse(text) {
      let html = text
        .replace(/### (.*?)\n/g, '<h3 style="color: #4f46e5; margin-top: 25px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;"><i class="fas fa-file-alt"></i> $1</h3>')
        .replace(/- ❌ \*\*Tu resposta:\*\* (.*?)\n/g, '<div style="background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 5px solid #ef4444;"><strong>Tu respuesta:</strong> $1</div>')
        .replace(/- ✅ \*\*Resposta correcta:\*\* (.*?)\n/g, '<div style="background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 5px solid #10b981;"><strong>Respuesta correcta:</strong> $1</div>')
        .replace(/- 💡 \*\*Explicación:\*\* (.*?)\n/g, '<div style="background: #eff6ff; color: #1e40af; padding: 18px; border-radius: 8px; border-left: 5px solid #3b82f6; margin: 15px 0; font-weight: bold;"><i class="fas fa-lightbulb"></i> <strong>Explicación:</strong> $1</div>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
      
      // Ajuste para não duplicar ícones se a IA já enviou um emoji
      html = html.replace(/<i class="fas fa-file-alt"><\/i> ([\uD800-\uDBFF][\uDC00-\uDFFF]|[\u2600-\u27BF])/g, '<i class="fas fa-file-alt"></i> ');
      return html;
    }

    async function getAIFeedback() {
      const btn = document.getElementById('btnGetAIFeedback');
      const content = document.getElementById('aiFeedbackContent');
      const btnRow = document.getElementById('aiFeedbackBtnRow');
      if (mistakeHistory.length === 0 && !getDebugParam()) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Consultando ao professor...';
      
      const simuladoTitle = document.querySelector('header h1')?.innerText || 'Simulado de Espanhol';
      
      const errorsToAnalyze = mistakeHistory.length > 0 ? mistakeHistory : [
        { question: 'Ellos _________ por teléfono. (hablar)', user_answer: 'está hablando', correct_answer: 'están hablando' },
        { question: 'La sopa _________ muy caliente.', user_answer: 'es', correct_answer: 'está' }
      ];
      const errorSummary = errorsToAnalyze.map(err => `- Pregunta: "${err.question}" | Tu resposta: "${err.user_answer}" | Resposta correcta: "${err.correct_answer}"`).join('\n');
      const promptText = `Eres un profesor de español experto y motivador. 
Analiza mis errores en este simulado "${simuladoTitle}" e identifica los conceptos gramaticales y léxicos involucrados. 
Además, identifica si hay patrones recurrentes en mis errores (por ejemplo: confusión ser/estar, problemas con géneros, tiempos verbales, léxico, etc.) y proporciona un análisis de la causa raíz para ayudarme a mejorar.

Fala 100% en español. Usa EXACTAMENTE este formato Markdown para cada error:
### Pregunta: [Enunciado]
- ❌ **Tu resposta:** [User Answer]
- ✅ **Resposta correcta:** [Correct Answer]
- 💡 **Explicación:** [Breve explicación pedagógica]

Y al final, incluye una sección de resumen de patrones:
### 🔍 Análisis de Patrones y Causa Raíz

    async function generateAndPlayFinalAudio(pct, mistakes, force = false) {
      if (audioPlayed && !force) return;
      if (!force) audioPlayed = true;
      let msg = "";
      const mins = Math.floor(elapsedTime / 60);
      const secs = elapsedTime % 60;
      const timeStr = mins > 0 ? `${mins} minutos y ${secs} segundos` : `${secs} segundos`;
      
      if (pct === 100 && mistakes === 0) {
        msg = `¡Increíble! Has conseguido una puntuación perfecta del 100% a la primera en solo ${timeStr}. ¡Eres un maestro absoluto!`;
      } else if (pct === 100) {
        msg = `¡Excelente! Has completado todo correctamente en ${timeStr}. Aunque tuviste ${mistakes} errores durante la práctica, lograste corregirlos todos. ¡Buen trabajo!`;
      } else if (pct >= 70) {
        msg = `¡Muy bien! Has terminado con un ${pct}%. Tardaste ${timeStr}. Durante el ejercicio cometiste ${mistakes} errores. ¡Sigue practicando para llegar al cien por cien!`;
      } else {
        msg = `Has terminado el simulado. Tu puntuación final es de ${pct}% y has tenido un total de ${mistakes} errores durante tu entrenamiento. No te rindas, repasa los consejos del Tutor de IA y vuelve a intentarlo. ¡Ánimo!`;
      }

      try {
        const response = await fetch('https://audio.boletoazap.dev.br/tts', {
          method: 'POST',
          headers: { 'accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `text=${encodeURIComponent(msg)}&voice=es-ES-ElviraNeural&use_gemini=false&convert_to_ogg=false`
        });
        if (response.ok) {
          const data = await response.json();
          const audioBase64 = data.audio_base64;
          const audioMime = data.audio_mime || "audio/mpeg";
          if (audioBase64) {
            const audio = new Audio(`data:${audioMime};base64,${audioBase64}`);
            audio.play();
          }
        }
      } catch (e) { console.error("TTS Error:", e); }
    }

    function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function sortByNumero(items) { return (items || []).slice().sort((a, b) => (Number(a.numero) || 0) - (Number(b.numero) || 0)); }
    function chooseVariants(items) { const byNum = {}; (items || []).forEach(it => { const k = it.numero || ''; if (!byNum[k]) byNum[k] = []; byNum[k].push(it); }); return Object.keys(byNum).map(k => byNum[k][Math.floor(Math.random() * byNum[k].length)]); }
    function getSlugParam() { return new URLSearchParams(location.search).get('slug')?.toLowerCase() || ''; }
    function getGroupSetParam() { const raw = new URLSearchParams(location.search).get('groupset'); return raw ? Number(raw) : null; }
    function getDebugParam() { return new URLSearchParams(location.search).get('debug') === 'true'; }

    function renderDebugButton() {
      if (!getDebugParam()) return;
      const btn = document.createElement('button'); btn.className = 'test-btn'; btn.style.background = '#8b5cf6'; btn.style.marginLeft = '10px'; btn.innerHTML = '<i class="fas fa-vial"></i> Debug AI';
      btn.onclick = () => { renderAIFeedbackUI(); const c = document.getElementById('aiFeedbackContainer'); if(c){ c.style.display='block'; window.scrollTo({top: c.offsetTop, behavior:'smooth'}); } };
      document.querySelector('.actions').appendChild(btn);
      
      const btnAudio = document.createElement('button'); btnAudio.className = 'test-btn'; btnAudio.style.background = '#ec4899'; btnAudio.style.marginLeft = '10px'; btnAudio.innerHTML = '<i class="fas fa-volume-up"></i> Final Audio';
      btnAudio.onclick = () => {
        const stats = getCurrentStats();
        generateAndPlayFinalAudio(stats.pct, stats.mistakes, true);
      };
      document.querySelector('.actions').appendChild(btnAudio);
    }

    function getCurrentStats() {
      const rows = Array.from(document.querySelectorAll('.row')).filter(r => r.dataset.checked === 'true');
      const correct = rows.filter(r => r.dataset.correct === '1').length;
      const pct = totalQuestions > 0 ? Math.round((correct / totalQuestions) * 100) : 0;
      return { pct, mistakes: mistakeHistory.length, finished: rows.length === totalQuestions };
    }

    async function loadSimulado() {
      try {
        const res = await fetch('questoes.json?v=' + Date.now());
        const data = await res.json();
        const slug = getSlugParam();
        let simulado = (data.simulados || []).find(s => (s.slug || '').toLowerCase() === slug) || data.simulados[0];
        if (simulado.groupsSets) {
           const paramIndex = getGroupSetParam();
           const sets = simulado.groupsSets.map(set => set.map(g => ({ ...g, items: chooseVariants(g.perguntas || []) })));
           const idx = (paramIndex !== null && paramIndex < sets.length) ? paramIndex : Math.floor(Math.random() * sets.length);
           simulado = { ...simulado, groups: sets[idx] };
        }
        document.querySelector('header h1').textContent = `Simulado – ${simulado.title}`;
        renderSimuladosSelector(data.simulados, simulado.slug);
        renderQuiz(simulado);
        renderDebugButton();
      } catch (e) { document.getElementById('quiz').innerHTML = '<div class="bad">Erro ao carregar simulado</div>'; }
    }

    function renderQuiz(simulado) {
      const quiz = document.getElementById('quiz'); quiz.innerHTML = '';
      stopTimer(); startTimer();
      let count = 0;
      (simulado.groups || []).forEach((group, gidx) => {
        const section = document.createElement('section'); section.className = 'card';
        const groupImgSrc = group.imagem || group.image || group.imageUrl || '';
        const groupImgHtml = groupImgSrc ? `<figure class="prompt-media" style="margin-bottom: 20px;"><img src="${groupImgSrc}" loading="lazy" style="width: 100%; height: auto; border-radius: 6px;"></figure>` : '';
        const groupAudioSrc = group.audio || group.audioUrl || group.audioLink || group.som || '';
        const groupAudioHtml = groupAudioSrc ? `<figure class="prompt-audio" style="margin-bottom: 20px; width: 100%;"><audio controls preload="none" src="${groupAudioSrc}" style="width: 100%; max-width: 100%;"></audio></figure>` : '';
        section.innerHTML = `<h2>${group.title} <span class="badge">${group.badge || ''}</span></h2>${groupImgHtml}${groupAudioHtml}`;

        const groupItems = group.items || group.perguntas || group.questions || [];
        groupItems.forEach((q, idx) => {
          count++;
          const wrap = document.createElement('div'); wrap.className = 'row';
          const number = q.numero ?? count;
          wrap.dataset.gabarito = JSON.stringify(q.gabarito || []);
          const t = q.type || q.tipo || (Array.isArray(q.opcoes) ? 'mc' : 'text');
          wrap.dataset.type = t;
          const imgSrc = q.imagem || q.image || q.imageUrl;
          const imgHtml = imgSrc ? '<figure class="prompt-media"><img src="' + imgSrc + '" loading="lazy" style="width: 100%; height: auto; border-radius: 6px;"></figure>' : '';
          const audioSrc = q.audio || q.audioUrl || q.audioLink || q.som;
          const audioHtml = audioSrc ? '<figure class="prompt-audio"><audio controls preload="none" src="' + audioSrc + '"></audio></figure>' : '';

          let inputHtml = '';
          if (t === 'mc' && Array.isArray(q.opcoes)) {
            const name = `q-${gidx}-${number}`;
            inputHtml = q.opcoes.map(opt => `<label style="display:block; margin:6px 0;"><input type="radio" name="${name}" value="${opt}"> ${opt}</label>`).join('');
          } else if (t === 'select' && Array.isArray(q.opcoes)) {
            inputHtml = `<select class="sel" style="width:100%; padding:12px; font-size:18px; border:1px solid #bbb; border-radius:6px;"><option value="" selected disabled>Seleccione...</option>` +
                        q.opcoes.map(opt => `<option value="${opt}">${opt}</option>`).join('') + `</select>`;
          } else {
            inputHtml = `<input class="inp" type="text" spellcheck="true" lang="es">`;
          }

          wrap.innerHTML = `<div class="num">${number}.</div><div style="flex:1">${imgHtml}${audioHtml}<label class="label">${q.enunciado}</label>${inputHtml}<div class="feedback"></div></div>`;
          section.appendChild(wrap);
        });
        quiz.appendChild(section);
      });
      totalQuestions = count;
      document.querySelectorAll('.row input.inp').forEach(inp => inp.onblur = (e) => { checkRow(e.target.closest('.row')); updateScore(); });
      document.querySelectorAll('.row select.sel').forEach(sel => sel.onchange = (e) => { checkRow(e.target.closest('.row')); updateScore(); });
      document.querySelectorAll('.row input[type=radio]').forEach(rad => rad.onchange = (e) => { checkRow(e.target.closest('.row')); updateScore(); });
    }

    function normalize(s) { 
      return (s || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, ' ');
    }

    function checkRow(row) {
      const feedback = row.querySelector('.feedback');
      const ans = JSON.parse(row.dataset.gabarito || '[]');
      const type = row.dataset.type;
      let val = '';
      if (type === 'mc') val = row.querySelector('input[type=radio]:checked')?.value || '';
      else if (type === 'select') val = row.querySelector('select.sel')?.value || '';
      else val = row.querySelector('input.inp')?.value || '';
      
      const questionLabel = (row.querySelector('.label')?.innerText || '').trim();
      if (!val) return false;
      const isCorrect = ans.some(a => normalize(a) === normalize(val));
      if (isCorrect) {
        feedback.innerHTML = '<div class="ok">Correto</div>';
      } else {
        feedback.innerHTML = `<div class="bad">Incorrecto. Correto: ${ans[0]}</div>`;
        // Adiciona ao histórico de erros toda vez que errar, sem remover
        const alreadyTracked = mistakeHistory.some(err => err.question === questionLabel && normalize(err.user_answer) === normalize(val));
        if (!alreadyTracked) {
          mistakeHistory.push({ question: questionLabel, user_answer: val, correct_answer: ans[0] });
        }
      }
      row.dataset.checked = 'true'; row.dataset.correct = isCorrect ? '1' : '0';
      renderAIFeedbackUI(); return isCorrect;
    }

    function updateScore() {
      const stats = getCurrentStats();
      document.getElementById('scoreBox').innerHTML = `<i class="fas fa-star"></i> Nota: ${stats.pct}%`;
      updateProgress(stats.pct);
      if (stats.finished) {
        if (stats.pct === 100) showSuccessModal();
        renderAIFeedbackUI();
        generateAndPlayFinalAudio(stats.pct, stats.mistakes);
      }
    }

    function updateProgress(pct) {
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('progressRunner').style.left = `calc(${pct}% - 12px)`;
    }

    function startTimer() { startTime = Date.now(); timerInterval = setInterval(() => { elapsedTime = Math.floor((Date.now()-startTime)/1000); document.getElementById('timer').innerText = formatTime(elapsedTime); }, 1000); }
    function stopTimer() { clearInterval(timerInterval); }
    function formatTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

    function showSuccessModal() {
      const modal = document.getElementById('successModal'); if (modal.dataset.shown === 'true') return;
      modal.dataset.shown = 'true'; stopTimer();
      document.getElementById('finalTime').innerText = formatTime(Math.floor((Date.now()-startTime)/1000));
      
      // Pre-encher dados do ranking se existirem no localStorage
      const savedName = localStorage.getItem('rankName');
      const savedPhone = localStorage.getItem('rankPhone');
      if (savedName) document.getElementById('rankName').value = savedName;
      if (savedPhone) document.getElementById('rankPhone').value = savedPhone;

      modal.classList.add('show');
    }
    function closeSuccessModal() { document.getElementById('successModal').classList.remove('show'); }

    async function showRanking() {
      const modal = document.getElementById('rankingModal');
      const content = document.getElementById('rankingContent');
      const slug = getSlugParam();
      
      modal.classList.add('show');
      content.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Cargando ranking...</p>';
      
      try {
        const response = await fetch(`ranking.php?action=get_ranking&slug=${encodeURIComponent(slug)}`);
        const text = await response.text();
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          if (text.trim().startsWith('<?php')) {
            throw new Error('Servidor sem PHP: O arquivo ranking.php está sendo lido como texto. Use um servidor que suporte PHP.');
          }
          throw new Error('Resposta inválida do servidor.');
        }
        
        if (data.success && data.ranking && data.ranking.length > 0) {
          let html = `
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nombre</th>
                  <th>Nota</th>
                  <th>Errores</th>
                  <th>Tiempo</th>
                </tr>
              </thead>
              <tbody>
          `;
          
          data.ranking.forEach((entry, idx) => {
            const time = formatTime(entry.time_seconds);
            html += `
              <tr>
                <td>${idx + 1}</td>
                <td style="font-weight:bold;">${entry.name}</td>
                <td>${entry.accuracy}%</td>
                <td>${entry.mistakes}</td>
                <td>${time}</td>
              </tr>
            `;
          });
          
          html += '</tbody></table>';
          content.innerHTML = html;
        } else if (data.success) {
          content.innerHTML = '<p style="margin:20px 0;">Aún no hay puntuaciones para este simulado. ¡Sé el primero!</p>';
        } else {
          throw new Error(data.error);
        }
      } catch (e) {
        content.innerHTML = `<p class="bad">Error al cargar el ranking: ${e.message}</p>`;
      }
    }

    function closeRankingModal() { document.getElementById('rankingModal').classList.remove('show'); }

    async function saveRankingData() {
      const name = document.getElementById('rankName').value.trim();
      const phone = document.getElementById('rankPhone').value.trim();
      const btn = document.getElementById('btnSaveRanking');
      
      if (!name || !phone) {
        alert('Por favor, ingresa tu nombre y celular.');
        return;
      }

      const stats = getCurrentStats();
      const slug = getSlugParam();
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

      const formData = new FormData();
      formData.append('name', name);
      formData.append('phone', phone);
      formData.append('accuracy', stats.pct);
      formData.append('mistakes', stats.mistakes);
      formData.append('time_seconds', elapsedTime);
      formData.append('slug', slug);

      try {
        const response = await fetch('ranking.php?action=save_score', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        
        if (data.success) {
          // Salvar no localStorage
          localStorage.setItem('rankName', name);
          localStorage.setItem('rankPhone', phone);
          
          closeSuccessModal();
          showRanking();
          updateTopPlayerDisplay();
        } else {
          throw new Error(data.error);
        }
      } catch (e) {
        alert('Error al salvar el ranking: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Guardar mi puntuación';
      }
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled'); }
    function loadDarkModePreference() { if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode'); }

    function renderSimuladosSelector(simulados, selectedSlug) {
      const sel = document.getElementById('simSelect');
      sel.innerHTML = '<option value="" disabled>Selecione...</option>';
      simulados.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.slug; opt.textContent = s.title;
        if (s.slug === selectedSlug) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = () => { location.href = `?slug=${sel.value}`; };
    }

    loadDarkModePreference(); loadSimulado();
  </script>
